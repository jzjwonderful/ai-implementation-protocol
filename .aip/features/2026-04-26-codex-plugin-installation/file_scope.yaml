allowed_paths:
  - .agents/
  - plugins/
  - README.md
  - project_docs/
key_entrypoints:
  - plugins/ai-implementation-protocol/.codex-plugin/plugin.json
  - plugins/ai-implementation-protocol/skills/aip/SKILL.md
