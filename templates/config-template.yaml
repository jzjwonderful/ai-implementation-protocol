# AIP 项目适配配置 —— 引擎(协议/check)按这里声明的内容适配本项目。
# 改这一份即完成"把通用 AIP 引擎绑定到本项目"，无需改协议或脚本。

# 真理源：本项目的权威文档（spec/PRD/conventions 等）。AIP 把它们加进 must_read。
truth_sources:
  # - docs/PRD.md
  # - docs/conventions/ui-and-dev-guidelines.md

# 机器检查：声明"通过"必须真跑绿的命令。aip check 据此把验收硬绑真实证据，
# 而不是只看文书是否写齐。每条含 name + cmd（在 repo 根可执行）。
gates:
  tests:
    # cmd: ""              # 例：python -m pytest -q
  build:
    # cmd: ""              # 例：dotnet build -c Debug / npm run build
  lint_or_drift:
    # cmd: ""              # 例：契约漂移锁 / knip / vulture / ruff
  e2e:
    # cmd: ""              # 真机/真浏览器场景；产出证据落 reports/

# 反堆积机器兜底（可选，按技术栈填）。
anti_accretion:
  # ts: "npx knip"
  # python: "vulture ."
  # duplication: "npx jscpd"

# 领域专家视角：按改动域条件挂载的专家视角清单（域名由项目定义）。
# 每个视角指向一份 checklist 文档；改动碰到对应 globs 时挂载。
lenses:
  # - name: frontend
  #   when_globs: ["web/**", "webapp/**"]
  #   checklist: docs/lenses/frontend.md
  # - name: client
  #   when_globs: ["client/**", "agent/**"]
  #   checklist: docs/lenses/client.md

# 索引工具：手动更新的代码图谱/知识库。AIP 在"复用优先检查"里要求查前先刷新。
indexes:
  # - name: codegraph
  #   refresh: "<刷新命令或 MCP 动作>"
  # - name: nexus
  #   refresh: "nexus-mapper"

# 项目铁律：实现时自动触发的硬约束（编码/契约重生成/文档同次更新等）。
iron_rules:
  # - "改 API 后必须重生成契约：<命令>"
  # - "行为变更同次更新 STATUS + 对应真理源"
  # - "新建文件 <编码要求>；编辑既有文件保持原编码"
  # - "未授权不提交（git add/commit/push 需用户明确指示）"

# 验证规范：真机/真浏览器要求等（自由文本指针）。
# verification_notes: ""

# 方法层（可选）：声明本项目用哪个 process-skill 框架当"怎么做"的技法层。
# 设为 superpowers 则各阶段把方法让位给对应 superpowers 技能（映射见 aip 技能）；
# 槽/状态/resume 仍归 AIP。缺失或留空则 AIP 裸跑、只少了技法加持。
process_skills: ""   # 例：superpowers
